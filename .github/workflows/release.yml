name: Release Android

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to publish, for example v1.2.3 or v1.2.3-rc.1
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: 3.38.1
  JAVA_VERSION: "17"

jobs:
  build_android:
    name: Build Android release assets
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      release_tag: ${{ steps.release_meta.outputs.release_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="${{ github.event.inputs.tag }}"
          fi

          if [[ -z "$release_tag" ]]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Validate release metadata
        id: release_meta
        shell: bash
        run: |
          release_info=$(./scripts/validate_release_tag.sh "${{ steps.resolve_tag.outputs.release_tag }}")
          printf '%s\n' "$release_info"
          printf '%s\n' "$release_info" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        id: flutter
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
          pub-cache: true

      - name: Print SDK versions
        shell: bash
        run: |
          echo "flutter-action version=${{ steps.flutter.outputs.VERSION }}"
          echo "flutter-action channel=${{ steps.flutter.outputs.CHANNEL }}"
          flutter --version
          dart --version

      - name: Install dependencies
        run: make get

      - name: Run release checks
        run: make ci-check

      - name: Restore Android signing config
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          for name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD
          do
            if [[ -z "${!name}" ]]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/voicenotes-release.jks

          cat <<EOF > android/key.properties
          storeFile=../voicenotes-release.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build release APK
        run: make apk-release BUILD_NAME="${{ steps.release_meta.outputs.build_name }}" BUILD_NUMBER="${{ steps.release_meta.outputs.build_number }}"

      - name: Build release AAB
        run: make aab-release BUILD_NAME="${{ steps.release_meta.outputs.build_name }}" BUILD_NUMBER="${{ steps.release_meta.outputs.build_number }}"

      - name: Compute release asset names
        id: asset_names
        shell: bash
        run: |
          apk_name=$(BUILD_NAME="${{ steps.release_meta.outputs.build_name }}" BUILD_NUMBER="${{ steps.release_meta.outputs.build_number }}" ./scripts/release_asset_name.sh)
          aab_name=$(BUILD_NAME="${{ steps.release_meta.outputs.build_name }}" BUILD_NUMBER="${{ steps.release_meta.outputs.build_number }}" ASSET_EXT="aab" ./scripts/release_asset_name.sh)

          echo "apk_name=$apk_name" >> "$GITHUB_OUTPUT"
          echo "aab_name=$aab_name" >> "$GITHUB_OUTPUT"

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/${{ steps.asset_names.outputs.apk_name }}"
          cp build/app/outputs/bundle/release/app-release.aab "dist/${{ steps.asset_names.outputs.aab_name }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-release-assets
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish_release:
    name: Publish GitHub release
    needs: build_android
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          name: android-release-assets
          path: dist

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build_android.outputs.release_tag }}
        shell: bash
        run: |
          shopt -s nullglob
          files=(dist/*)

          if (( ${#files[@]} == 0 )); then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* --verify-tag --generate-notes --title "$RELEASE_TAG"
          fi
